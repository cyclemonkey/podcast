version: '3.8'

services:
  podcastfy:
    build:
      context: .
      dockerfile: Dockerfile_api
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - AUTHENTIK_URL=${AUTHENTIK_URL}
    expose:
      - "8000"
    volumes:
      - audio_data:/app/podcastfy/api/temp_audio
      - user_data:/app/podcastfy/api/user_data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.services.podcastfy.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.authentik-auth@file"
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true

volumes:
  audio_data:
  user_data:
