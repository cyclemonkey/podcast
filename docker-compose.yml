version: '3.8'

services:
  podcastfy:
    build:
      context: .
      dockerfile: Dockerfile_api
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - APP_USERS=${APP_USERS}
    expose:
      - "8000"
    volumes:
      - audio_data:/app/podcastfy/api/temp_audio
      - upload_data:/app/podcastfy/api/uploads
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true

volumes:
  audio_data:
  upload_data:
