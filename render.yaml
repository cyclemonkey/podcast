services:
  - type: web
    name: myers-podcast
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    plan: free
    startCommand: uvicorn podcastfy.api.fast_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: APP_USERS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
