services:
  - type: web
    name: podcast
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    plan: free
    startCommand: uvicorn podcastfy.api.fast_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: AUTHENTIK_CLIENT_ID
        sync: false
      - key: AUTHENTIK_CLIENT_SECRET
        sync: false
      - key: AUTHENTIK_SLUG
        sync: false
      - key: APP_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: USER_DATA_DIR
        value: /data
      - key: ADMIN_USERS
        sync: false
    healthCheckPath: /health
    disk:
      name: podcast-data
      mountPath: /data
      sizeGB: 1
