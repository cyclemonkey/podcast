services:
  - type: web
    name: myers-podcast
    runtime: python
    buildCommand: >
      pip install -r requirements.txt &&
      python -m playwright install --with-deps chromium
    startCommand: uvicorn podcastfy.api.fast_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: APP_USERS
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
